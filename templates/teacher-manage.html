<!DOCTYPE html>
<html lang="fa-IR" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>طراحی آزمون</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='manage.css') }}"
    />
    <link rel="icon" href="{{ url_for('static', filename='images/logo.png') }}">
  </head>
  <body>
    <div class="quiz-name">
      <div>
        <div>
          <label for="quiz-name-user">نام آزمون :</label>
          <input type="text" required id="quiz-name-user" placeholder="مثلا : ریاضی"/>

          <label for="quiz-pass-user">یک رمز برای آزمون انتخاب کنید:</label>
          <input type="text" required id="quiz-pass-user" placeholder="مثلا : 1122"/>
        </div>
        <button class="next-level">مرحله بعد</button>
      </div>
    </div>

    <main id="main">
      <div class="cont" id="cont">
        <form method="post" class="form">
          <button type="button" class="close-btn">❌</button>

          <label>متن سوال</label>
          <input
            type="text"
            required
            name="question"
            placeholder="متن سوال خود را وارد کنید ..."
            class="text"
          />

          <div class="cont-con">
            <div class="con">
              <label>گزینه 1</label>

              <div>
                <input
                  type="text"
                  required
                  class="item"
                  name="item1"
                  placeholder="گزینه اول سوال ..."
                  value=""
                />
              </div>
            </div>

            <div class="con">
              <label>گزینه 2</label>

              <div>
                <input
                  type="text"
                  required
                  class="item"
                  name="item2"
                  placeholder="گزینه دوم سوال ..."
                  value=""
                />
              </div>
            </div>
          </div>

          <div class="cont-con">
            <div class="con">
              <label>گزینه 3</label>

              <div>
                <input
                  type="text"
                  required
                  class="item"
                  name="item3"
                  placeholder="گزینه سوم سوال ..."
                  value=""
                />
              </div>
            </div>

            <div class="con">
              <label>گزینه 4</label>

              <div>
                <input
                  type="text"
                  required
                  class="item"
                  name="item4"
                  placeholder="گزینه چهارم سوال ..."
                  value=""
                />
              </div>
            </div>
          </div>

          <div class="con-item-add">
            <div class="con-t-s">
              <p class="true-item">گزینه درست :</p>

              <select id="select" name="select" class="select"></select>
            </div>

            <button type="button" class="item-btn">افزودن گزینه ها</button>
          </div>
        </form>

      </div>
    </main>

    <button type="button" id="add-qu">اضافه کردن سوال</button>
    <form method="post">
      <button type="submit" class="send-btn">مرحله بعد</button>
    </form>

    <script src="{{ url_for('static', filename='JS/manage.js') }}"></script>
  </body>
</html>
